{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
<div class="container mx-auto">
    <h1 class="text-2xl font-bold mb-6">Admin Dashboard (FR-12)</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl shadow p-4">
            <h2 class="text-xl font-semibold mb-3">Users</h2>
            <div id="users-list" class="space-y-2 max-h-96 overflow-y-auto"></div>
        </div>
        <div class="bg-white rounded-xl shadow p-4">
            <h2 class="text-xl font-semibold mb-3">Active SOS Alerts</h2>
            <div id="sos-list" class="space-y-2 max-h-96 overflow-y-auto"></div>
        </div>
    </div>
</div>
<script>
    async function loadUsers() {
        const res = await fetch('/admin/api/users');
        const users = await res.json();
        document.getElementById('users-list').innerHTML = users.map(u => `
            <div class="border-b pb-1">${u.name} (${u.role}) - ${u.email}</div>
        `).join('');
    }
    async function loadSOS() {
        const res = await fetch('/admin/api/sos-alerts');
        const alerts = await res.json();
        const container = document.getElementById('sos-list');
        if (alerts.length === 0) {
            container.innerHTML = '<p class="text-gray-500">No active SOS</p>';
            return;
        }
        container.innerHTML = alerts.map(s => `
            <div class="bg-red-50 p-2 rounded">
                <div>Ride ${s.ride_id} - ${s.triggered_by}</div>
                <div>Location: ${s.gps_location}</div>
                <button onclick="resolveSOS(${s.sos_id})" class="bg-green-600 text-white px-2 py-1 rounded text-sm">Resolve</button>
            </div>
        `).join('');
    }
    async function resolveSOS(id) {
        await fetch(`/admin/api/resolve-sos/${id}`, {method: 'POST'});
        loadSOS();
    }
    loadUsers(); loadSOS();
</script>
{% endblock %}
