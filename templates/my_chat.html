{% extends "base.html" %}

{% block title %}{{ _('My Chat') }}{% endblock %}

{% block head_extra %}
<style>
    .conversation-item {
        transition: all 0.2s ease;
    }
    .conversation-item:hover {
        background-color: #f8fafc;
        transform: translateX(4px);
    }
    .message-bubble {
        max-width: 70%;
        word-wrap: break-word;
    }
    .message-sent {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .message-received {
        background: #f1f5f9;
        color: #475569;
    }
    .unread-indicator {
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">{{ _('My Chat') }}</h1>
        <p class="mt-2 text-gray-600">{{ _('View and manage your conversations') }}</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Conversations List -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-4">
                    <h2 class="text-lg font-semibold">{{ _('Conversations') }}</h2>
                </div>
                <div id="conversationsList" class="divide-y divide-gray-200 max-h-96 overflow-y-auto">
                    <!-- Conversations will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div id="chatHeader" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-4 hidden">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 id="chatUserName" class="text-lg font-semibold"></h3>
                            <p id="chatUserEmail" class="text-blue-100 text-sm"></p>
                        </div>
                        <button onclick="closeChat()" class="text-white hover:text-blue-200">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                </div>
                
                <div id="chatWelcome" class="p-8 text-center text-gray-500">
                    <i class="fas fa-comments text-6xl mb-4 text-gray-300"></i>
                    <p class="text-lg">{{ _('Select a conversation to start chatting') }}</p>
                </div>
                
                <div id="chatMessages" class="hidden h-96 overflow-y-auto p-4 space-y-4 bg-gray-50">
                    <!-- Messages will be loaded here -->
                </div>
                
                <div id="chatInput" class="hidden border-t p-4 bg-white">
                    <div class="flex gap-2">
                        <input type="text" id="messageInput" 
                               placeholder="{{ _('Type your message...') }}" 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="sendMessage()" 
                                class="bg-gradient-to-r from-blue-500 to-purple-600 text-white px-6 py-2 rounded-lg hover:from-blue-600 hover:to-purple-700 transition">
                            <i class="fas fa-paper-plane"></i> {{ _('Send') }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentChatUserId = null;
    let socket = null;

    // Initialize Socket.IO
    function initializeSocket() {
        socket = io();
        
        socket.on('new_message', (data) => {
            if (data.sender_id === currentChatUserId || data.receiver_id === currentChatUserId) {
                loadMessages(currentChatUserId);
            } else {
                // Update conversations list if it's a different conversation
                loadConversations();
            }
        });
    }

    // Load conversations list
    async function loadConversations() {
        try {
            const res = await fetch('/api/chat/conversations');
            const conversations = await res.json();
            
            const container = document.getElementById('conversationsList');
            
            if (conversations.length === 0) {
                container.innerHTML = `
                    <div class="p-4 text-center text-gray-500">
                        <i class="fas fa-inbox text-3xl mb-2"></i>
                        <p>{{ _('No conversations yet') }}</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item p-4 cursor-pointer hover:bg-gray-50 relative" 
                     onclick="openChat(${conv.user_id}, '${conv.name}', '${conv.email}')">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <h4 class="font-semibold text-gray-900">${conv.name}</h4>
                            <p class="text-sm text-gray-600 truncate">${conv.last_message}</p>
                            <p class="text-xs text-gray-400">${new Date(conv.last_message_time).toLocaleString()}</p>
                        </div>
                        ${conv.unread_count > 0 ? `
                            <div class="flex items-center gap-2">
                                <span class="bg-red-500 text-white text-xs rounded-full px-2 py-1">
                                    ${conv.unread_count}
                                </span>
                                <div class="unread-indicator"></div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
        } catch (error) {
            console.error('Error loading conversations:', error);
        }
    }

    // Open chat with specific user
    async function openChat(userId, userName, userEmail) {
        currentChatUserId = userId;
        
        // Update UI
        document.getElementById('chatWelcome').classList.add('hidden');
        document.getElementById('chatHeader').classList.remove('hidden');
        document.getElementById('chatMessages').classList.remove('hidden');
        document.getElementById('chatInput').classList.remove('hidden');
        
        document.getElementById('chatUserName').textContent = userName;
        document.getElementById('chatUserEmail').textContent = userEmail;
        
        // Load messages
        await loadMessages(userId);
        
        // Mark messages as read
        markMessagesAsRead(userId);
        
        // Join private chat room
        if (socket) {
            socket.emit('join_private_chat', { other_user_id: userId });
        }
    }

    // Load messages for conversation
    async function loadMessages(userId) {
        try {
            const res = await fetch(`/api/chat/conversation/${userId}`);
            const data = await res.json();
            
            const container = document.getElementById('chatMessages');
            const currentUserId = {{ current_user.user_id }};
            
            container.innerHTML = data.messages.map(msg => `
                <div class="flex ${msg.sender_id === currentUserId ? 'justify-end' : 'justify-start'}">
                    <div class="message-bubble ${msg.sender_id === currentUserId ? 'message-sent' : 'message-received'} px-4 py-2 rounded-lg">
                        <p class="text-sm">${msg.content}</p>
                        <p class="text-xs ${msg.sender_id === currentUserId ? 'text-blue-100' : 'text-gray-500'} mt-1">
                            ${new Date(msg.sent_at).toLocaleTimeString()}
                        </p>
                    </div>
                </div>
            `).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
            
        } catch (error) {
            console.error('Error loading messages:', error);
        }
    }

    // Send message
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        
        if (!content || !currentChatUserId) return;
        
        try {
            const res = await fetch('/api/chat/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                },
                body: JSON.stringify({
                    receiver_id: currentChatUserId,
                    content: content
                })
            });
            
            if (res.ok) {
                input.value = '';
                // Messages will be updated via socket.io
            } else {
                const error = await res.json();
                alert(error.error || 'Failed to send message');
            }
            
        } catch (error) {
            console.error('Error sending message:', error);
            alert('Failed to send message');
        }
    }

    // Mark messages as read
    async function markMessagesAsRead(userId) {
        try {
            await fetch(`/api/chat/mark-read/${userId}`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                }
            });
            
            // Update notification badge with actual count
            if (typeof updateNotificationBadge === 'function') {
                updateNotificationBadge();
            }
            
            // Reload conversations to update unread counts
            loadConversations();
            
        } catch (error) {
            console.error('Error marking messages as read:', error);
        }
    }

    // Close chat
    function closeChat() {
        currentChatUserId = null;
        
        document.getElementById('chatWelcome').classList.remove('hidden');
        document.getElementById('chatHeader').classList.add('hidden');
        document.getElementById('chatMessages').classList.add('hidden');
        document.getElementById('chatInput').classList.add('hidden');
    }

    // Handle Enter key in message input
    document.addEventListener('DOMContentLoaded', function() {
        initializeSocket();
        loadConversations();
        
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Mark messages as read when page loads (clear notifications)
        if (typeof markMessagesAsRead === 'function') {
            markMessagesAsRead();
        }
    });
</script>
{% endblock %}
