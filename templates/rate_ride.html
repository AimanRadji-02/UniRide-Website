{% extends "base.html" %}
{% block title %}{{ _('Rate Your Ride') }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-2xl font-bold mb-4">{{ _('Rate Your Ride') }}</h1>
    <form id="ratingForm">
        <input type="hidden" id="ride_id" value="{{ ride_id }}">
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">{{ _('Rating (1-5 stars)') }}</label>
            <div class="flex space-x-2 rtl:space-x-reverse" id="star-rating"></div>
            <input type="hidden" id="rating_value" name="rating_value" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">{{ _('Comment (optional)') }}</label>
            <textarea id="comment" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea>
        </div>
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg w-full hover:bg-indigo-700 transition">{{ _('Submit Rating') }}</button>
    </form>
</div>

<script>
    const starContainer = document.getElementById('star-rating');
    const ratingInput = document.getElementById('rating_value');
    let currentRating = 0;
    for (let i = 1; i <= 5; i++) {
        const star = document.createElement('i');
        star.className = 'far fa-star text-2xl cursor-pointer text-yellow-500 mr-1';
        star.dataset.value = i;
        star.addEventListener('click', () => {
            currentRating = i;
            ratingInput.value = i;
            document.querySelectorAll('#star-rating i').forEach((s, idx) => {
                s.className = idx < i ? 'fas fa-star text-2xl text-yellow-500 mr-1' : 'far fa-star text-2xl text-yellow-500 mr-1';
            });
        });
        starContainer.appendChild(star);
    }

    document.getElementById('ratingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const rideId = document.getElementById('ride_id').value;
        const rating = document.getElementById('rating_value').value;
        const comment = document.getElementById('comment').value;
        if (!rating) {
            alert('{{ _("Please select a rating") }}');
            return;
        }
        const res = await fetch('/api/ratings/submit', {
            method: 'POST',
            headers: csrfHeaders(),
            body: JSON.stringify({ ride_id: parseInt(rideId), rating_value: parseInt(rating), comment })
        });
        if (res.ok) {
            alert('{{ _("Thank you for your rating!") }}');
            window.location.href = '/api/bookings/my-bookings';
        } else {
            const err = await res.json();
            alert(err.error);
        }
    });
</script>
{% endblock %}
