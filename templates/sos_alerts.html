{% extends "base.html" %}
{% block title %}{{ _('SOS Alerts') }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ _('Emergency SOS Alerts') }}</h1>
<div id="sos-list" class="space-y-4">
    <div class="text-center py-8">{{ _('Loading...') }}</div>
</div>

<script>
    async function loadSOSAlerts() {
        const res = await fetch('/api/sos/my-alerts');
        const alerts = await res.json();
        const container = document.getElementById('sos-list');
        if (alerts.length === 0) {
            container.innerHTML = '<div class="bg-white rounded-xl shadow p-6 text-center text-gray-500">{{ _("No SOS alerts triggered.") }}</div>';
            return;
        }
        container.innerHTML = alerts.map(s => `
            <div class="bg-red-50 border-l-4 border-red-500 rounded-xl shadow p-5">
                <div class="flex justify-between">
                    <div>
                        <div class="font-bold text-red-700"><i class="fas fa-exclamation-triangle"></i> {{ _('SOS Event #') }}${s.sos_id}</div>
                        <div>{{ _('Ride ID') }}: ${s.ride_id}</div>
                        <div>{{ _('Location') }}: ${s.gps_location}</div>
                        <div>{{ _('Triggered at') }}: ${new Date(s.triggered_at).toLocaleString()}</div>
                        <div>{{ _('Status') }}: <span class="font-semibold ${s.status === 'active' ? 'text-red-600' : 'text-green-600'}">${s.status}</span></div>
                    </div>
                    ${s.status === 'active' ? `<div><button disabled class="bg-gray-400 text-white px-3 py-1 rounded">{{ _('Resolving...') }}</button></div>` : ''}
                </div>
            </div>
        `).join('');
    }
    loadSOSAlerts();
</script>
{% endblock %}
