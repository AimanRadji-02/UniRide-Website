{% extends "base.html" %}
{% block title %}{{ _('Login') }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-6">
    <h2 class="text-2xl font-bold mb-6">{{ _('Login to UniRide') }}</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">{{ _('Email') }}</label>
            <input type="email" name="email" required class="w-full border rounded-lg px-3 py-2">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">{{ _('Password') }}</label>
            <input type="password" name="password" required class="w-full border rounded-lg px-3 py-2">
        </div>
        <button type="submit" class="bg-indigo-600 text-white w-full py-2 rounded-lg">{{ _('Login') }}</button>
    </form>
    <p class="mt-4 text-center">{{ _("Don't have an account?") }} <a href="{{ url_for('auth.register_page') }}" class="text-indigo-600">{{ _('Sign Up') }}</a></p>
</div>
{% endblock %}
