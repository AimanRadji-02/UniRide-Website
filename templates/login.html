{% extends "base.html" %}
{% block title %}{{ _('Login') }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto ur-card p-6 sm:p-8">
    <h2 class="text-2xl font-bold text-slate-900 mb-6">{{ _('Login to UniRide') }}</h2>
    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">{{ _('Email') }}</label>
            <input type="email" name="email" id="loginEmail" required autocomplete="username"
                class="w-full border border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">{{ _('Password') }}</label>
            <input type="password" name="password" id="loginPassword" required autocomplete="current-password"
                class="w-full border border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transition shadow-sm">{{ _('Login') }}</button>
    </form>
    <p class="mt-5 text-center text-sm text-slate-600">{{ _("Don't have an account?") }} <a href="{{ url_for('auth.register_page') }}" class="text-indigo-600 font-semibold hover:text-indigo-800">{{ _('Sign Up') }}</a></p>

    </div>
{% endblock %}
