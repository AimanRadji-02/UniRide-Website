{% extends "base.html" %}
{% block title %}{{ _('My Bookings') }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ _('My Bookings') }}</h1>
<div id="bookings-list" class="space-y-4">
    <div class="text-center py-8">{{ _('Loading...') }}</div>
</div>

<script>
    async function loadBookings() {
        const res = await fetch('/api/bookings/api/my-bookings');
        const bookings = await res.json();
        const container = document.getElementById('bookings-list');
        if (bookings.length === 0) {
            container.innerHTML = '<div class="bg-white rounded-xl shadow p-6 text-center text-gray-500">{{ _("You have no bookings.") }}</div>';
            return;
        }
        container.innerHTML = bookings.map(b => `
            <div class="bg-white rounded-xl shadow p-5 flex flex-wrap justify-between items-center">
                <div>
                    <div class="font-bold text-lg">${b.ride.origin} → ${b.ride.destination}</div>
                    <div class="text-gray-600"><i class="far fa-calendar-alt"></i> ${new Date(b.ride.departure_datetime).toLocaleString()}</div>
                    <div class="text-sm">${b.seats_requested} seat(s) · $${b.total_price}</div>
                    <span class="inline-block mt-2 px-2 py-1 rounded text-xs font-semibold 
                        ${b.status === 'confirmed' ? 'bg-green-100 text-green-800' : 
                          b.status === 'cancelled' ? 'bg-red-100 text-red-800' : 
                          'bg-yellow-100 text-yellow-800'}">
                        ${b.status}
                    </span>
                </div>
                <div>
                    ${b.can_cancel ? `<button onclick="cancelBooking(${b.booking_id})" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600"><i class="fas fa-times"></i> {{ _('Cancel') }}</button>` : ''}
                    ${b.status === 'confirmed' && new Date(b.ride.departure_datetime) < new Date() ? `<a href="/api/ratings/rate/${b.ride_id}" class="bg-indigo-500 text-white px-4 py-2 rounded-lg hover:bg-indigo-600"><i class="fas fa-star"></i> {{ _('Rate Ride') }}</a>` : ''}
                    ${b.status === 'confirmed' ? `<a href="/api/rides/track/${b.ride_id}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300"><i class="fas fa-map-marker-alt"></i> {{ _('Live Track') }}</a>` : ''}
                </div>
            </div>
        `).join('');
    }

    async function cancelBooking(bookingId) {
        if (!confirm('{{ _("Are you sure you want to cancel this booking?") }}')) return;
        const res = await fetch('/api/bookings/api/cancel', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ booking_id: bookingId })
        });
        if (res.ok) {
            alert('{{ _("Booking cancelled successfully.") }}');
            loadBookings();
        } else {
            const err = await res.json();
            alert(err.error);
        }
    }
    loadBookings();
</script>
{% endblock %}
