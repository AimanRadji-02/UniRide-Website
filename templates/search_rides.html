{% extends "base.html" %}
{% block title %}{{ _('Search Rides') }}{% endblock %}
{% block head_extra %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">{{ _('Search Rides') }}</h1>
    <div class="bg-white rounded-xl shadow p-6">
        <form id="searchForm" class="space-y-4">
            <div><label>{{ _('Origin') }}</label><input type="text" id="origin" class="w-full border rounded px-3 py-2"></div>
            <div><label>{{ _('Destination') }}</label><input type="text" id="destination" class="w-full border rounded px-3 py-2"></div>
            <div><label>{{ _('Date') }}</label><input type="date" id="date" class="w-full border rounded px-3 py-2"></div>
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">{{ _('Search') }}</button>
        </form>
    </div>
    <div id="results" class="mt-6 space-y-4"></div>
</div>

<script>
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const origin = document.getElementById('origin').value;
        const destination = document.getElementById('destination').value;
        const date = document.getElementById('date').value;
        let url = `/api/rides/api/search?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}`;
        if (date) url += `&date=${date}`;
        const res = await fetch(url);
        const rides = await res.json();
        const container = document.getElementById('results');
        if (rides.length === 0) {
            container.innerHTML = '<div class="bg-white rounded-xl shadow p-6 text-center">{{ _("No rides found.") }}</div>';
            return;
        }
        container.innerHTML = rides.map(r => `
            <div class="bg-white rounded-xl shadow p-5 flex flex-wrap justify-between">
                <div><div class="font-bold">${r.origin} → ${r.destination}</div>
                <div>${new Date(r.departure_datetime).toLocaleString()}</div>
                <div>{{ _('Seats') }}: ${r.available_seats} · $${r.price_per_seat}</div>
                <div class="text-sm text-gray-500">{{ _('Driver') }}: ${r.driver_name}</div></div>
                <div><button onclick="bookRide(${r.ride_id})" class="bg-green-600 text-white px-4 py-2 rounded-lg">{{ _('Book Now') }}</button></div>
            </div>
        `).join('');
    });
    async function bookRide(rideId) {
        const seats = prompt("{{ _('How many seats?') }}", "1");
        if (!seats) return;
        const res = await fetch('/api/bookings/api/request', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ride_id: rideId, seats_requested: parseInt(seats) })
        });
        if (res.ok) alert("{{ _('Booking confirmed!') }}");
        else alert((await res.json()).error);
    }
</script>
{% endblock %}
