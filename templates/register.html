{% extends "base.html" %}
{% block title %}{{ _('Register') }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-6">
    <h2 class="text-2xl font-bold mb-6">{{ _('Create Account') }}</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3"><label>{{ _('Full Name') }}</label><input type="text" name="name" required class="w-full border rounded px-3 py-2"></div>
        <div class="mb-3"><label>{{ _('Email') }}</label><input type="email" name="email" required class="w-full border rounded px-3 py-2"></div>
        <div class="mb-3"><label>{{ _('Phone') }}</label><input type="tel" name="phone" required class="w-full border rounded px-3 py-2"></div>
        <div class="mb-3"><label>{{ _('Password') }}</label><input type="password" name="password" required class="w-full border rounded px-3 py-2"></div>
        <div class="mb-3"><label>{{ _('Role') }}</label>
            <select name="role" class="w-full border rounded px-3 py-2">
                <option value="passenger">{{ _('Passenger') }}</option>
                <option value="driver">{{ _('Driver') }}</option>
            </select>
        </div>
        <div id="vehicleField" class="mb-3 hidden"><label>{{ _('Vehicle Details') }}</label><input type="text" name="vehicle_details" class="w-full border rounded px-3 py-2"></div>
        <button type="submit" class="bg-indigo-600 text-white w-full py-2 rounded-lg">{{ _('Register') }}</button>
    </form>
</div>
<script>
    document.querySelector('select[name="role"]').addEventListener('change', function() {
        document.getElementById('vehicleField').classList.toggle('hidden', this.value !== 'driver');
    });
</script>
{% endblock %}
